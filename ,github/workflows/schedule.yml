name: Fairway Intel — Weekly Schedule

on:
  schedule:
    # All times UTC. ET = UTC-4 (EDT) / UTC-5 (EST)
    # Sunday 11pm ET  = Monday 03:00 UTC
    - cron: "0 3 * * 1"
    # Monday 6am ET   = Monday 10:00 UTC
    - cron: "0 10 * * 1"
    # Monday 10am ET  = Monday 14:00 UTC
    - cron: "0 14 * * 1"
    # Monday 7pm ET   = Tuesday 23:00 UTC
    - cron: "0 23 * * 1"
    # Tuesday 9:30am ET = Tuesday 13:30 UTC
    - cron: "30 13 * * 2"
    # Tuesday 6pm ET  = Tuesday 22:00 UTC
    - cron: "0 22 * * 2"
    # Wednesday 9am ET = Wednesday 13:00 UTC
    - cron: "0 13 * * 3"
    # Wednesday 11am ET = Wednesday 15:00 UTC
    - cron: "0 15 * * 3"
    # Wednesday 4pm ET  = Wednesday 20:00 UTC
    - cron: "0 20 * * 3"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type override (e.g. sunday_night, monday_6am, manual)"
        required: false
        default: "manual"
      force_full:
        description: "Force all steps (true/false)"
        required: false
        default: "false"

jobs:
  run-fairway-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: fairway-intel-${{ hashFiles('requirements.txt') }}
          restore-keys: fairway-intel-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect run type from cron schedule
        id: detect_run
        run: |
          # Map current UTC hour/day to run type
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DOW=$(date -u +%u)   # 1=Mon … 7=Sun

          # Manual workflow dispatch override
          if [ "${{ github.event.inputs.run_type }}" != "" ] && [ "${{ github.event.inputs.run_type }}" != "manual" ]; then
            echo "run_type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Cron-based detection
          if [ "$DOW" = "1" ] && [ "$HOUR" = "3" ];  then echo "run_type=sunday_night"   >> $GITHUB_OUTPUT
          elif [ "$DOW" = "1" ] && [ "$HOUR" = "10" ]; then echo "run_type=monday_6am"   >> $GITHUB_OUTPUT
          elif [ "$DOW" = "1" ] && [ "$HOUR" = "14" ]; then echo "run_type=monday_10am"  >> $GITHUB_OUTPUT
          elif [ "$DOW" = "1" ] && [ "$HOUR" = "23" ]; then echo "run_type=monday_7pm"   >> $GITHUB_OUTPUT
          elif [ "$DOW" = "2" ] && [ "$HOUR" = "13" ]; then echo "run_type=tuesday_930am" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "2" ] && [ "$HOUR" = "22" ]; then echo "run_type=tuesday_6pm"  >> $GITHUB_OUTPUT
          elif [ "$DOW" = "3" ] && [ "$HOUR" = "13" ]; then echo "run_type=wednesday_9am" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "3" ] && [ "$HOUR" = "15" ]; then echo "run_type=wednesday_11am" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "3" ] && [ "$HOUR" = "20" ]; then echo "run_type=wednesday_4pm" >> $GITHUB_OUTPUT
          else echo "run_type=manual" >> $GITHUB_OUTPUT
          fi

      - name: Run Fairway Intel
        env:
          RUN_TYPE:           ${{ steps.detect_run.outputs.run_type }}
          DATAGOLF_KEY:       ${{ secrets.DATAGOLF_KEY }}
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN_PUSH:      ${{ secrets.GH_TOKEN_PUSH }}
          FORCE_FULL:         ${{ github.event.inputs.force_full }}
          LOG_LEVEL:          INFO
        run: |
          echo "Run type: $RUN_TYPE"
          if [ "$FORCE_FULL" = "true" ]; then
            python main.py --run-type "$RUN_TYPE" --full
          else
            python main.py --run-type "$RUN_TYPE"
          fi

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fairway-intel-failure-log
          path: "*.log"
          retention-days: 7
          

